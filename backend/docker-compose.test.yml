services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: clawos-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clawos_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clawos_test"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - clawos_pg_test_data:/var/lib/postgresql/data

volumes:
  clawos_pg_test_data:
