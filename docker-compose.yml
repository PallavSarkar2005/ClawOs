services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: clawos-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clawos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro

  redis:
    image: redis:7
    container_name: clawos-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
