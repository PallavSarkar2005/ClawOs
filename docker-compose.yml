services:
  postgres:
    image: postgres:17
    container_name: clawos-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clawos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: clawos-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: