name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci || npm install

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawos_ci

      - name: Unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawos_ci
          JWT_SECRET: test-jwt-secret-key-minimum-32-chars-abcdef
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-min-32-chars-ghijkl
          ENCRYPTION_KEY: test-encryption-key-minimum-32-chars-mnopqr
          CORS_ORIGINS: http://localhost:5173
          RATE_LIMIT_DISABLED: "true"
          OPENCLAW_MOCK_LLM: "true"

      - name: Frontend install & build
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

  integration-e2e:
    name: Integration & E2E
    runs-on: ubuntu-latest
    needs: lint-and-unit
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clawos_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clawos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5434/clawos_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5434/clawos_test?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: test-jwt-secret-key-minimum-32-chars-abcdef
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-min-32-chars-ghijkl
      ENCRYPTION_KEY: test-encryption-key-minimum-32-chars-mnopqr
      CORS_ORIGINS: http://localhost:5173
      RATE_LIMIT_DISABLED: "true"
      OPENCLAW_MOCK_LLM: "true"
      COVERAGE_THRESHOLD: "40"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci || npm install

      - name: Preflight environment
        run: node scripts/preflight-tests.js

      - name: Verify Prisma schema
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db push --accept-data-loss

      - name: Integration tests
        run: npm run test:integration

      - name: E2E tests
        run: npm run test:e2e

      - name: Coverage report
        run: npm run test:coverage

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/tests/reports/
            backend/coverage/
          if-no-files-found: ignore

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint-and-unit, integration-e2e]
    steps:
      - name: All checks passed
        run: echo "Lint, unit, integration, E2E, build, and migrations succeeded."
